# Stimma Configuration Template
#
# This file is used as a template when creating a new config.yaml.
# The actual config is stored in your OS-specific data directory:
#   - macOS: ~/Library/Application Support/stimma[-modifier]/config.yaml
#   - Windows: %APPDATA%/stimma[-modifier]/config.yaml
#   - Linux: ~/.local/share/stimma[-modifier]/config.yaml
#
# Copy this file to modify settings, or edit the config.yaml in your data directory.

# ============ PROFILE SETTINGS ============
# Each profile has its own database, external media sources, and markers.
# Generated and uploaded content is stored privately by Stimma.
profiles:
  - id: __PROFILE_ID__
    name: "Default"
    folders: []
    markers:
      - name: favorite
        icon_svg: heroicons:heart
        color: "#ef4444"
      - name: library
        icon_svg: heroicons:bookmark
        color: "#3b82f6"

# ============ TOOL PROVIDERS ============
# Configure tool providers for image generation and manipulation.
# Supports external JSON-RPC providers (stdio or websocket).
# tool_providers: []

# ============ GENERATOR BACKENDS ============
# Legacy generator configuration (deprecated - use tool_providers instead)
# generators: []

# ============ LLM CONFIGURATION ============
# Configure LLMs for the copilot agent and prompt enhancement.
# Two roles:
#   - agent: Main copilot model (large, capable)
#   - agent-fast: Mid-sized model for prompt enhancement, captioning, lora matching
#
# Each role supports three sources (switch without losing config):
#   - source: 'auto' | 'stimma_cloud' | 'endpoint'
#   - endpoint: OpenAI-compatible endpoint config (vLLM, LM Studio, Ollama, etc.)
#
# Default uses Stimma Cloud when available, then a configured local endpoint.

default_model: auto  # Global default model slug for chat model picker

llms:
  agent:
    source: auto
  agent-fast:
    source: auto

# ============ CLIP CONFIGURATION ============
clip:
  model: "ViT-g-14"
  pretrained: "laion2b_s12b_b42k"

# ============ FACE DETECTION ============
face_detection:
  enabled: true
  min_confidence: 0.5
  max_faces: 10
  parallelism: 2
  similarity_threshold: 0.65

# ============ TELEMETRY ============
# Anonymous usage telemetry (official builds only). `enabled` is tri-state:
# unset = consent undetermined (onboarding asks), true = consented,
# false = declined. Leave it unset on first run so onboarding can ask;
# STIMMA_PRIVACY_LOCKDOWN=1 disables Stimma service contact regardless.
# telemetry:
#   enabled: false

# ============ SERVER SETTINGS ============
server:
  host: "127.0.0.1"
  port: 8000
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR
