name: Quality Gate
run-name: Quality Gate - ${{ inputs.ref || github.ref_name || 'manual' }}

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to test
        required: false
        default: ""
        type: string
      acceptance_suite:
        description: "Acceptance suite to run: smoke or full"
        required: false
        default: smoke
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test
        required: false
        default: ""
      acceptance_suite:
        description: Acceptance suite to run
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-extras --locked

      - name: Lint backend
        run: tools/stimma lint backend

      - name: Run backend tests
        # -m "not darkroom": the Darkroom tool tests cover rarely-changing
        # vendored code; run them locally or explicitly with -m darkroom.
        run: tools/stimma test backend -vv -rA --maxfail=1 -m "not darkroom"

  acceptance-tests:
    name: Acceptance tests
    runs-on: ubuntu-latest
    # The runner's package mirrors occasionally make the FFmpeg install take
    # longer than the normal five-minute acceptance lane.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend deps
        working-directory: backend
        run: uv sync --all-extras --locked

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run smoke acceptance tests
        if: ${{ inputs.acceptance_suite != 'full' }}
        run: tools/stimma test acceptance acceptance/tests/release-acceptance.spec.ts --timeout=30000 --retries=0

      - name: Run full acceptance tests
        if: ${{ inputs.acceptance_suite == 'full' }}
        run: tools/stimma test acceptance

      - name: Upload acceptance artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-artifacts
          retention-days: 2
          if-no-files-found: ignore
          path: |
            frontend/test-results/
            frontend/acceptance/playwright-report/
            frontend/acceptance/acceptance/
