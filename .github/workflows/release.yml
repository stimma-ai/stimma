name: Release
run-name: Release - ${{ github.ref_name || inputs.ref || 'manual' }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Release tag ref, branch, or SHA
        required: true
        default: main
      skip_quality_gate:
        description: Emergency bypass for the release quality gate
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# Releases must not overlap: concurrent runs race on the self-hosted macOS
# signer — one run's keychain cleanup strips the other's active signing
# keychain from the search list mid-codesign (errSecInternalComponent).
# Queue instead of cancel: a beta and its production promotion may both be
# tagged within minutes and both must ship.
concurrency:
  group: release-signing
  cancel-in-progress: false

jobs:
  release-meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}

    steps:
      - name: Resolve metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          ref="$REF"
          ref_name="$REF_NAME"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ref="$INPUT_REF"
            ref_name="${ref#refs/tags/}"
            ref_name="${ref_name#refs/heads/}"
          fi

          if [[ "$ref_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            channel="beta"
          elif [[ "$ref_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            channel="production"
          else
            echo "Release refs must be tags like v1.2.3 or v1.2.3-beta.1."
            exit 1
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref_name#v}" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

  quality-gate:
    name: Quality gate
    needs: release-meta
    if: ${{ !inputs.skip_quality_gate }}
    uses: ./.github/workflows/quality-gate.yml
    with:
      ref: ${{ needs.release-meta.outputs.ref }}

  macos:
    name: macOS
    needs:
      - release-meta
      - quality-gate
    if: ${{ always() && (inputs.skip_quality_gate || needs.quality-gate.result == 'success') }}
    uses: ./.github/workflows/release-macos.yml
    with:
      ref: ${{ needs.release-meta.outputs.ref }}
      channel: ${{ needs.release-meta.outputs.channel }}
      version: ${{ needs.release-meta.outputs.version }}
      publish_updates: true
      publish_github_release: true
    secrets: inherit

  windows:
    name: Windows
    needs:
      - release-meta
      - quality-gate
    if: ${{ always() && (inputs.skip_quality_gate || needs.quality-gate.result == 'success') }}
    uses: ./.github/workflows/release-windows.yml
    with:
      ref: ${{ needs.release-meta.outputs.ref }}
      channel: ${{ needs.release-meta.outputs.channel }}
      version: ${{ needs.release-meta.outputs.version }}
      publish_updates: true
      publish_github_release: true
    secrets: inherit

  linux:
    name: Linux AppImage x64
    needs:
      - release-meta
      - quality-gate
    if: ${{ always() && (inputs.skip_quality_gate || needs.quality-gate.result == 'success') }}
    uses: ./.github/workflows/linux-appimage.yml
    with:
      ref: ${{ needs.release-meta.outputs.ref }}
      channel: ${{ needs.release-meta.outputs.channel }}
      version: ${{ needs.release-meta.outputs.version }}
      publish_updates: true
      publish_github_release: true
    secrets: inherit

  release-notes:
    name: Publish release notes
    needs:
      - release-meta
      - macos
      - windows
      - linux
      - linux-arm64
    # Production only: re-publishing rebuilds notes/index.json so this
    # version's "released" flag flips once the release actually shipped.
    # Notes content is read from main, not the tagged commit — notes edits
    # may land after the promoted commit was tagged.
    if: ${{ needs.release-meta.outputs.channel == 'production' }}
    runs-on: ubuntu-latest
    env:
      BUCKET: ${{ vars.R2_BUCKET }}
      R2_S3_ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish notes to R2
        run: bash scripts/publish-release-notes.sh

  linux-arm64:
    name: Linux AppImage arm64
    needs:
      - release-meta
      - quality-gate
    if: ${{ always() && (inputs.skip_quality_gate || needs.quality-gate.result == 'success') }}
    uses: ./.github/workflows/linux-appimage.yml
    with:
      ref: ${{ needs.release-meta.outputs.ref }}
      channel: ${{ needs.release-meta.outputs.channel }}
      version: ${{ needs.release-meta.outputs.version }}
      publish_updates: true
      publish_github_release: true
      arch: aarch64
      runs_on: '["self-hosted","linux","arm64","spark"]'
    secrets: inherit
