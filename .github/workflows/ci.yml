name: CI
run-name: CI - ${{ github.ref_name || 'manual' }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/quality-gate.yml
    with:
      ref: ${{ github.ref }}
