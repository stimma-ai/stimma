name: Build / Desktop
run-name: Build / Desktop - ${{ inputs.channel }} - ${{ inputs.ref }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: true
        default: main
      channel:
        description: Release channel for updater endpoint
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
          - alpha
          - beta
          - production
      version:
        description: App version to embed (semver)
        required: false
        default: ""
      publish_updates:
        description: Publish updater and download artifacts to Cloudflare R2
        required: true
        default: false
        type: boolean

# The reusable build workflows request `contents: write` (they create GitHub
# release assets on tag builds). A called workflow can never be granted more
# permission than its caller holds, and this repo's default workflow token is
# read-only (Settings > Actions > Workflow permissions = "Read repository
# contents"). Without this block the workflow_dispatch token is `contents: read`,
# so the called workflows' `contents: write` request exceeds it and GitHub
# rejects the run at startup (startup_failure) before any job begins. The tag
# `push` path is unaffected because there each reusable runs as its own
# top-level workflow and its `permissions:` block applies directly. Granting
# write here keeps the called workflows within the caller's permission set.
permissions:
  contents: write

jobs:
  macos:
    name: macOS
    uses: ./.github/workflows/release-macos.yml
    with:
      ref: ${{ inputs.ref }}
      channel: ${{ inputs.channel }}
      version: ${{ inputs.version }}
      publish_updates: ${{ inputs.publish_updates }}
    secrets: inherit

  windows:
    name: Windows
    uses: ./.github/workflows/release-windows.yml
    with:
      ref: ${{ inputs.ref }}
      channel: ${{ inputs.channel }}
      version: ${{ inputs.version }}
      publish_updates: ${{ inputs.publish_updates }}
    secrets: inherit

  linux:
    name: Linux AppImage
    uses: ./.github/workflows/linux-appimage.yml
    with:
      ref: ${{ inputs.ref }}
      channel: ${{ inputs.channel }}
      version: ${{ inputs.version }}
      publish_updates: ${{ inputs.publish_updates }}
    secrets: inherit
